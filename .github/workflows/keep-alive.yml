name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase
        run: curl -s -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY" "https://fgquwzzyudgcmfbuvmch.supabase.co/rest/v1/venues?select=id&limit=1" && echo "Ping complete"
