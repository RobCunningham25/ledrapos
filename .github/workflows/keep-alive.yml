name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://jeajrapzxzpgleggttvh.supabase.co/rest/v1/venues?select=id&limit=1'
          method: 'GET'
          customHeaders: '{"apikey": "${{ secrets.SUPABASE_ANON_KEY }}", "Authorization": "Bearer ${{ secrets.SUPABASE_ANON_KEY }}"}'
